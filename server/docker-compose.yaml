---
services:
  mem0:
    build:
      context: ..  # Set context to parent directory
      dockerfile: server/dev.Dockerfile
    container_name: mem0-api
    restart: unless-stopped
    networks:
      - frontend
      - backend
    ports:
      - "8333:8000"
    environment:
      # --- LLM (Ollama pe mașina separată) ---
      LLM_PROVIDER: "ollama"
      LLM_MODEL: "llama3.2:3b"
      OLLAMA_BASE_URL: "http://10.30.33.222:11434"
      # --- Embeddings (tot Ollama) ---
      EMBEDDING_PROVIDER: "ollama"
      EMBEDDING_MODEL: "nomic-embed-text"
      OLLAMA_EMBEDDING_BASE_URL: "http://10.30.33.222:11434"
      # --- Vector Store ---
      VECTOR_STORE_PROVIDER: "qdrant"
      QDRANT_URL: "https://qdrant.homelab.rip"
      # --- Security ---
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      # --- History ---
      HISTORY_DB_PATH: "/data/history.db"
    volumes:
      - ${APPDATA}/mem0/:/data
    labels:
      # Traefik
      traefik.enable: true
      traefik.http.routers.mem0-rtr.entrypoints: websecure
      traefik.http.routers.mem0-rtr.rule: Host(`mem0.$DOMAINNAME`)
      traefik.http.routers.mem0-rtr.tls: true
      traefik.http.routers.mem0-rtr.service: mem0-svc
      traefik.http.services.mem0-svc.loadbalancer.server.port: 8000

networks:
  frontend:
    external: true
  backend:
    external: true
